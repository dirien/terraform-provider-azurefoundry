version: "2"

formatters:
  enable:
    - gofumpt
    - goimports

linters:
  enable:
    # bugs
    - bodyclose
    - durationcheck
    - errcheck
    - errorlint
    - gosec
    - govet
    - loggercheck
    - nilerr
    - noctx
    - recvcheck
    - sqlclosecheck

    # performance
    - copyloopvar
    - intrange
    - mirror
    - perfsprint
    - prealloc
    - usestdlibvars

    # style & conventions
    - asciicheck
    - bidichk
    - dupword
    - errname
    - forbidigo
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - misspell
    - modernize
    - nolintlint
    - nosprintfhostport
    - predeclared
    - revive
    - tagliatelle
    - unconvert
    - unparam
    - wastedassign
    - whitespace

    # testing
    - thelper
    - tparallel
    - usetesting

    # unused / dead code
    - fatcontext
    - reassign

  settings:
    forbidigo:
      forbid:
        - pattern: 'ioutil\.*'
          msg: "use os and io packages instead of ioutil"
      exclude-godoc-examples: true
      analyze-types: true
    tagliatelle:
      case:
        use-field-name: false
        rules:
          yaml: goCamel
          json: snake
    errorlint:
      asserts: true
      comparison: true
      errorf: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - importShadow
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: unreachable-code
        - name: var-naming
    misspell:
      locale: US
      ignore-rules:
        - organisation
    gocyclo:
      min-complexity: 15
    perfsprint:
      err-error: true
      errorf: true
      sprintf1: true
    gosec:
      excludes:
        - G104
        - G204
        - G304
        # G101 false-positive on public OAuth scope constants like
        # "https://search.azure.com/.default" — these aren't credentials,
        # they're well-known AAD scope identifiers we send to GetToken.
        - G101

  exclusions:
    rules:
      # Search data-plane wire types use the camelCase JSON keys the Azure
      # AI Search REST API documents (azureBlobParameters, containerName,
      # @odata.etag, …). Tagliatelle would otherwise force them to
      # snake_case, which would break the on-the-wire shape. Foundry-data-
      # plane wire types stay snake_case as before.
      - path: internal/client/(knowledge_source_v2|knowledge_base_v2)\.go
        linters:
          - tagliatelle
      # Foundry project_indexes uses camelCase JSON keys (connectionName,
      # indexName, fieldMapping, …) per the SDK's rest_field annotations
      # in azure-ai-projects/.../models/_models.py. Different from the
      # snake_case Foundry-agent convention — the Indexes API is shaped
      # like the AzureML asset surface.
      - path: internal/client/project_index_v2\.go
        linters:
          - tagliatelle
